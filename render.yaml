services:
  - type: web
    name: zain-media-admin
    runtime: python
    region: singapore
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn server:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.0
      - key: SMTP_EMAIL
        value: memogazar049@gmail.com
      - key: SMTP_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
