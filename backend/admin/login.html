<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zain Media — تسجيل الدخول</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #7C3AED; --primary-light: #A78BFA; --secondary: #F59E0B;
            --bg: #0A0A12; --bg-card: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08); --text: #F1F1F7; --text-muted: #9CA3B2;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .bg-glow {
            position: fixed; inset: -50%;
            background: radial-gradient(ellipse at 30% 20%, rgba(124,58,237,0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(245,158,11,0.05) 0%, transparent 50%);
            pointer-events: none;
        }
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            position: relative;
            backdrop-filter: blur(10px);
        }
        .login-card::before {
            content: ''; position: absolute; inset: -1px;
            border-radius: 24px;
            background: linear-gradient(135deg, var(--primary), transparent, var(--secondary));
            z-index: -1; opacity: 0.3;
        }
        .login-logo {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            font-size: 24px; font-weight: 800; margin-bottom: 8px;
        }
        .login-logo .logo-wrap {
            position: relative; width: 64px; height: 64px;
            display: flex; align-items: center; justify-content: center;
        }
        .login-logo .logo-wrap .login-logo-img {
            width: 64px; height: 64px;
            border-radius: 16px;
            object-fit: contain;
            filter: drop-shadow(0 0 24px rgba(124,58,237,0.4));
        }
        .login-logo span {
            background: linear-gradient(135deg, var(--primary-light), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .login-sub { text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 28px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: var(--text-muted); }
        .form-group input {
            width: 100%; padding: 12px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border); border-radius: 12px;
            color: var(--text); font-size: 15px; font-family: inherit;
            outline: none; transition: border-color 0.3s;
        }
        .form-group input:focus { border-color: var(--primary-light); }
        .btn {
            width: 100%; padding: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 700; font-family: inherit;
            cursor: pointer; transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 30px rgba(124,58,237,0.3); }
        .flash { padding: 12px 16px; border-radius: 12px; margin-bottom: 20px; font-size: 14px; }
        .flash-danger { background: rgba(239,68,68,0.12); color: #F87171; border: 1px solid rgba(239,68,68,0.2); }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="login-card">
        <div class="login-logo">
            <div class="logo-wrap">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Zain Media" class="login-logo-img">
            </div>
            <span>Zain Media</span>
        </div>
        <p class="login-sub">لوحة التحكم الإدارية</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label><i class="fas fa-user"></i> اسم المستخدم</label>
                <input type="text" name="username" required placeholder="أدخل اسم المستخدم">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> كلمة المرور</label>
                <input type="password" name="password" required placeholder="أدخل كلمة المرور">
            </div>
            <button type="submit" class="btn"><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</button>
        </form>
    </div>
</body>
</html>
